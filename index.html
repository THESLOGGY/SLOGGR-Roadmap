<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLOGGR's Roadmap</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <style>
    :root {
      color-scheme: dark;
      color: #e6e6e6;
      background: #0f1720;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(94, 114, 228, 0.2), transparent 35%),
                  radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.18), transparent 30%),
                  #0f1720;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 30px;
      background: rgba(15, 23, 32, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.23);
    }

    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 3vw, 3rem);
      letter-spacing: -0.04em;
    }

    p.description {
      margin: 12px 0 24px;
      color: #a1a1aa;
      line-height: 1.75;
    }

    details {
      margin: 12px 0;
      padding: 12px 18px;
      border-radius: 18px;
      background: rgba(148, 163, 184, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    summary {
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 700;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::before {
      content: '▾';
      display: inline-block;
      transform: rotate(0deg);
      transition: transform 0.2s ease;
      width: 1em;
      text-align: center;
      color: #7dd3fc;
    }

    details[open] summary::before {
      transform: rotate(180deg);
    }

    .section-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    ul.task-list {
      list-style: none;
      padding-left: 0;
      margin: 14px 0 0;
      display: grid;
      gap: 10px;
    }

    li.task {
      display: grid;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.08);
    }

    label.task-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    input[type='checkbox'] {
      width: 18px;
      height: 18px;
      accent-color: #7dd3fc;
      cursor: pointer;
    }

    input[type='checkbox']:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .children {
      margin: 0;
      padding-left: 24px;
      border-left: 1px solid rgba(148, 163, 184, 0.12);
    }

    .children li.task {
      padding: 10px 12px;
      background: rgba(15, 23, 32, 0.82);
    }

    .progress {
      margin-top: 8px;
      height: 10px;
      background: rgba(148, 163, 184, 0.16);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      width: 0%;
      transition: width 0.25s ease;
    }

    .footer {
      margin-top: 28px;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button {
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.18);
    }

    .button:active {
      transform: translateY(1px);
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .note {
      color: #cbd5e1;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>SLOGGR's Roadmap</h1>
    <p class="description">This page is a shared interactive roadmap. Everyone can view progress in real-time. Only the editor can make changes.</p>

    <div class="footer">
      <div>
        <div class="note">Shared roadmap synced in real-time with Firebase</div>
        <div id="auth-status" style="margin-top: 8px; font-weight: 600;">🔒 View Only Mode</div>
      </div>
      <button class="button" id="auth-button">Editor sign-in</button>
    </div>

    <div class="progress" aria-label="Overall progress">
      <div class="progress-bar" id="overall-progress"></div>
    </div>
    <div class="section-meta" id="progress-text">0 of 0 tasks complete</div>

    <details open data-key="section-boundless">
      <summary>
        <span>Boundless SMP Arc 1</span>
        <span class="section-meta">3 tasks</span>
      </summary>
      <ul class="task-list">
        <li class="task">
          <label class="task-label">
            <input type="checkbox" data-id="sloggr-episodes" disabled />
            <span><strong>SLOGGR's episodes</strong></span>
          </label>
          <div class="children">
            <ul class="task-list">
              <li class="task"><label class="task-label"><input type="checkbox" data-id="sloggr-ep1" data-parent="sloggr-episodes" /> Ep 1</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="sloggr-ep2" data-parent="sloggr-episodes" /> Ep 2</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="sloggr-ep3" data-parent="sloggr-episodes" /> Ep 3</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="sloggr-ep4" data-parent="sloggr-episodes" /> Ep 4</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="sloggr-ep5" data-parent="sloggr-episodes" /> Ep 5</label></li>
            </ul>
          </div>
        </li>

        <li class="task">
          <label class="task-label">
            <input type="checkbox" data-id="weirdfirestr-episodes" disabled />
            <span><strong>Weirdfirestr's episodes</strong></span>
          </label>
          <div class="children">
            <ul class="task-list">
              <li class="task"><label class="task-label"><input type="checkbox" data-id="weird-ep1" data-parent="weirdfirestr-episodes" /> Ep 1</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="weird-ep2" data-parent="weirdfirestr-episodes" /> Ep 2</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="weird-ep3" data-parent="weirdfirestr-episodes" /> Ep 3</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="weird-ep4" data-parent="weirdfirestr-episodes" /> Ep 4</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="weird-ep5" data-parent="weirdfirestr-episodes" /> Ep 5</label></li>
            </ul>
          </div>
        </li>

        <li class="task">
          <label class="task-label">
            <input type="checkbox" data-id="glitchplayz-episodes" disabled />
            <span><strong>GlitchTPlayz's episodes</strong></span>
          </label>
          <div class="children">
            <ul class="task-list">
              <li class="task"><label class="task-label"><input type="checkbox" data-id="glitch-ep1" data-parent="glitchplayz-episodes" /> Ep 1</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="glitch-ep2" data-parent="glitchplayz-episodes" /> Ep 2</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="glitch-ep3" data-parent="glitchplayz-episodes" /> Ep 3</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="glitch-ep4" data-parent="glitchplayz-episodes" /> Ep 4</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="glitch-ep5" data-parent="glitchplayz-episodes" /> Ep 5</label></li>
            </ul>
          </div>
        </li>
      </ul>
    </details>

    <details open data-key="section-videos">
      <summary>
        <span>My Videos</span>
        <span class="section-meta">2 tasks</span>
      </summary>
      <ul class="task-list">
        <li class="task">
          <label class="task-label">
            <input type="checkbox" data-id="upload-montage" disabled />
            <span><strong>Upload first montage</strong></span>
          </label>
          <div class="children">
            <ul class="task-list">
              <li class="task"><label class="task-label"><input type="checkbox" data-id="get-clips" data-parent="upload-montage" /> Get clips</label></li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="edit-montage" data-parent="upload-montage" /> Edit</label></li>
            </ul>
          </div>
        </li>
        <li class="task">
          <label class="task-label">
            <input type="checkbox" data-id="story-sloggr" disabled />
            <span><strong>The Story Of SLOGGR</strong></span>
          </label>
          <div class="children">
            <ul class="task-list">
              <li class="task">
                <label class="task-label">
                  <input type="checkbox" data-id="how-greed-kills" disabled />
                  <span><strong>How Greed Kills</strong></span>
                </label>
                <div class="children">
                  <ul class="task-list">
                    <li class="task"><label class="task-label"><input type="checkbox" data-id="how-greed-kills-edited" data-parent="how-greed-kills" /> Edited in</label></li>
                  </ul>
                </div>
              </li>
              <li class="task">
                <label class="task-label">
                  <input type="checkbox" data-id="the-mask" disabled />
                  <span><strong>The Mask</strong></span>
                </label>
                <div class="children">
                  <ul class="task-list">
                    <li class="task"><label class="task-label"><input type="checkbox" data-id="the-mask-edited" data-parent="the-mask" /> Edited in</label></li>
                  </ul>
                </div>
              </li>
              <li class="task">
                <label class="task-label">
                  <input type="checkbox" data-id="fortunae-teaser" disabled />
                  <span><strong>Fortunae Season 3 teaser + A Name lost to time</strong></span>
                </label>
                <div class="children">
                  <ul class="task-list">
                    <li class="task"><label class="task-label"><input type="checkbox" data-id="fortunae-edited" data-parent="fortunae-teaser" /> Edited in</label></li>
                  </ul>
                </div>
              </li>
              <li class="task">
                <label class="task-label">
                  <input type="checkbox" data-id="ruin-peace" disabled />
                  <span><strong>How To Ruin Peace</strong></span>
                </label>
                <div class="children">
                  <ul class="task-list">
                    <li class="task"><label class="task-label"><input type="checkbox" data-id="ruin-peace-edited" data-parent="ruin-peace" /> Edited in</label></li>
                  </ul>
                </div>
              </li>
              <li class="task"><label class="task-label"><input type="checkbox" data-id="extra-clips" data-parent="story-sloggr" /> Extra clips edited to be in description</label></li>
            </ul>
          </div>
        </li>
      </ul>
    </details>

    <details open data-key="section-derts">
      <summary>
        <span>DERTS PvP Ranks</span>
        <span class="section-meta">1 task</span>
      </summary>
      <ul class="task-list">
        <li class="task">
          <label class="task-label">
            <input type="checkbox" data-id="derts-website" disabled />
            <span><strong>DERTS Website</strong></span>
          </label>
          <div class="children">
            <ul class="task-list"></ul>
          </div>
        </li>
      </ul>
    </details>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBXnH9_fRHjT8xcvJJ1A1gbnruq7hwaV4g",
      authDomain: "sloggr-s-roadmap.firebaseapp.com",
      databaseURL: "https://sloggr-s-roadmap-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sloggr-s-roadmap",
      storageBucket: "sloggr-s-roadmap.firebasestorage.app",
      messagingSenderId: "748744563518",
      appId: "1:748744563518:web:6efcc4b1d5edee36976a6f",
      measurementId: "G-LXKQPSHXNF"
    };

    const allowedEditorEmail = 'YOUR_EMAIL@gmail.com';

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const checkboxes = Array.from(document.querySelectorAll('input[type="checkbox"][data-id]'));
    const detailsNodes = Array.from(document.querySelectorAll('details[data-key]'));
    const progressBar = document.getElementById('overall-progress');
    const progressText = document.getElementById('progress-text');
    const authButton = document.getElementById('auth-button');
    const authStatus = document.getElementById('auth-status');

    let isEditMode = false;
    let isInitialized = false;
    const dbPath = 'roadmap-state';

    function buildParentMap() {
      const map = new Map();
      checkboxes.forEach(box => {
        const parentId = box.dataset.parent;
        if (parentId) {
          if (!map.has(parentId)) {
            map.set(parentId, []);
          }
          map.get(parentId).push(box);
        }
      });
      return map;
    }

    const parentMap = buildParentMap();

    function updateParent(id) {
      const parentBox = document.querySelector(`input[data-id="${id}"]`);
      const children = parentMap.get(id) || [];
      if (!parentBox || children.length === 0) return;

      const allChecked = children.every(child => child.checked);
      parentBox.checked = allChecked;
      parentBox.indeterminate = !allChecked && children.some(child => child.checked);

      const parentOfParent = parentBox.dataset.parent;
      if (parentOfParent) {
        updateParent(parentOfParent);
      }
    }

    function updateAllParents() {
      Array.from(parentMap.keys()).forEach(id => updateParent(id));
    }

    function saveState() {
      if (!isEditMode || !isInitialized) return;

      const saved = {
        checkboxes: {},
        details: {}
      };

      checkboxes.forEach(box => {
        saved.checkboxes[box.dataset.id] = box.checked;
      });

      detailsNodes.forEach(detail => {
        saved.details[detail.dataset.key] = detail.open;
      });

      db.ref(dbPath).set(saved).catch(err => {
        console.error('Failed to save:', err);
        alert('Error saving to Firebase. Check console.');
      });

      updateProgress();
    }

    function loadState(data) {
      if (!data) {
        updateAllParents();
        updateProgress();
        return;
      }

      if (data.checkboxes) {
        checkboxes.forEach(box => {
          if (data.checkboxes.hasOwnProperty(box.dataset.id)) {
            box.checked = data.checkboxes[box.dataset.id];
          }
        });
      }

      if (data.details) {
        detailsNodes.forEach(detail => {
          const value = data.details[detail.dataset.key];
          if (typeof value === 'boolean') {
            detail.open = value;
          }
        });
      }

      updateAllParents();
      updateProgress();
    }

    function updateProgress() {
      const relevantBoxes = checkboxes.filter(box => !box.disabled || box.dataset.parent);
      const completed = relevantBoxes.filter(box => box.checked).length;
      const total = relevantBoxes.length;
      const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `${completed} of ${total} tasks complete (${percent}%)`;
    }

    function setEditMode(enabled) {
      isEditMode = enabled;
      checkboxes.forEach(box => {
        box.disabled = !enabled;
      });
      authStatus.textContent = enabled ? '✏️ Edit Mode ON' : '🔒 View Only Mode';
      authStatus.style.color = enabled ? '#22c55e' : '#94a3b8';
    }

    function updateAuthUI(user) {
      if (!user) {
        authButton.style.display = 'inline-flex';
        authButton.textContent = 'Editor sign-in';
        authStatus.textContent = '🔒 View Only Mode';
        authStatus.style.color = '#94a3b8';
        return;
      }

      authButton.style.display = 'none';
      if (user.email === allowedEditorEmail) {
        authStatus.textContent = `✏️ Signed in as ${user.email}`;
        authStatus.style.color = '#22c55e';
      } else {
        authStatus.textContent = `👁️ View only: ${user.email}`;
        authStatus.style.color = '#facc15';
      }
    }

    authButton.addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err => {
        console.error('Sign-in error:', err);
        alert('Sign-in failed. Check console.');
      });
    });

    checkboxes.forEach(box => {
      box.addEventListener('change', () => {
        if (!isEditMode) {
          box.checked = !box.checked;
          return;
        }
        const parentId = box.dataset.parent;
        if (parentId) {
          updateParent(parentId);
        }
        saveState();
      });
    });

    detailsNodes.forEach(detail => {
      detail.addEventListener('toggle', () => {
        if (isEditMode) {
          saveState();
        }
      });
    });

    auth.onAuthStateChanged(user => {
      updateAuthUI(user);
      if (!user) {
        setEditMode(false);
      } else if (user.email === allowedEditorEmail) {
        setEditMode(true);
      } else {
        setEditMode(false);
      }
    });

    db.ref(dbPath).on('value', snapshot => {
      const data = snapshot.val();
      loadState(data);
      if (!isInitialized) {
        isInitialized = true;
      }
    }, err => {
      console.error('Firebase error:', err);
      alert('Error connecting to Firebase. View data may be unavailable.');
      if (!isInitialized) {
        isInitialized = true;
      }
    });

    setEditMode(false);
  </script>
</body>
</html>
