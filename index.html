<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLOGGR's Roadmap</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <style>
    :root {
      color-scheme: dark;
      color: #e6e6e6;
      background: #0f1720;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background: linear-gradient(135deg, #071523 0%, #0e203f 35%, #0f3a28 65%, #103f20 100%);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.32), transparent 35%),
                  radial-gradient(circle at 85% 85%, rgba(34, 197, 94, 0.72), transparent 45%);
      opacity: 0.95;
      filter: blur(20px);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0% { opacity: 0.75; }
      100% { opacity: 0.95; }
    }

    .page {
      max-width: 1600px;
      width: min(98vw, 1600px);
      margin: 0 auto;
      padding: 18px 24px;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    h1 {
      margin: 0 auto;
      text-align: center;
      font-size: clamp(3rem, 6vw, 5rem);
      letter-spacing: -0.05em;
      color: #e6f7ff;
      text-shadow: 0 0 30px rgba(59, 130, 246, 0.45), 0 0 40px rgba(34, 197, 94, 0.25);
    }

    .main-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(360px, 1fr));
      gap: 26px;
      margin-top: 34px;
    }

    @media (max-width: 1280px) {
      .main-grid {
        grid-template-columns: repeat(2, minmax(320px, 1fr));
      }
    }

    @media (max-width: 980px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    details {
      margin: 0;
      padding: 18px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.22);
      border: 1px solid rgba(148, 163, 184, 0.14);
      backdrop-filter: blur(12px);
    }

    summary {
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 700;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::before {
      content: '▾';
      display: inline-block;
      transform: rotate(0deg);
      transition: transform 0.2s ease;
      width: 1em;
      text-align: center;
      color: #7dd3fc;
    }

    details[open] summary::before {
      transform: rotate(180deg);
    }

    .section-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    ul.task-list {
      list-style: none;
      padding-left: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    li.task {
      display: grid;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.08);
      transition: border-color 0.3s ease;
    }

    li.task.partial {
      border-color: rgba(234, 179, 8, 0.4);
    }

    li.task.full {
      border-color: rgba(34, 197, 94, 0.4);
    }

    .mini-progress-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .mini-progress {
      flex: 1;
      height: 4px;
      background: rgba(148, 163, 184, 0.16);
      border-radius: 999px;
      overflow: hidden;
    }

    .mini-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      width: 0%;
      transition: width 0.25s ease, background 0.25s ease;
    }

    .mini-progress.partial .mini-progress-bar {
      background: linear-gradient(90deg, #f59e0b, #eab308);
    }

    .mini-progress-text {
      font-size: 0.75rem;
      color: #94a3b8;
      min-width: 30px;
      text-align: right;
    }

    label.task-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      cursor: pointer;
      line-height: 1.2;
    }

    details details > summary {
      justify-content: center;
    }

    details details > summary > label.task-label {
      justify-content: center;
      width: 100%;
      text-align: center;
    }

    input[type='checkbox'] {
      width: 18px;
      height: 18px;
      accent-color: #7dd3fc;
      cursor: pointer;
      flex-shrink: 0;
    }

    input[type='checkbox']:checked {
      accent-color: #3b82f6;
    }

    input[type='checkbox']:indeterminate {
      accent-color: #eab308;
    }

    input[type='checkbox']:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .children {
      margin: 0;
      padding-left: 24px;
      border-left: 1px solid rgba(148, 163, 184, 0.12);
    }

    .children li.task {
      padding: 10px 12px;
      background: rgba(15, 23, 32, 0.82);
    }

    .progress {
      margin-top: 20px;
      height: 10px;
      background: rgba(148, 163, 184, 0.16);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      width: 0%;
      transition: width 0.25s ease;
    }
  </style>
</head>
<body>

                  <li class="task"><label class="task-label"><input type="checkbox" data-id="weird-ep1" data-parent="weirdfirestr-episodes" /> Ep 1</label></li>
                  <li class="task"><label class="task-label"><input type="checkbox" data-id="weird-ep2" data-parent="weirdfirestr-episodes" /> Ep 2</label></li>

                  <li class="task"><label class="task-label"><input type="checkbox" data-id="glitch-ep2" data-parent="glitchplayz-episodes" /> Ep 2</label></li>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBXnH9_fRHjT8xcvJJ1A1gbnruq7hwaV4g",
      authDomain: "sloggr-s-roadmap.firebaseapp.com",
      databaseURL: "https://sloggr-s-roadmap-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sloggr-s-roadmap",
      storageBucket: "sloggr-s-roadmap.firebasestorage.app",
      messagingSenderId: "748744563518",
      appId: "1:748744563518:web:6efcc4b1d5edee36976a6f",
      measurementId: "G-LXKQPSHXNF"
    };

    const allowedEditorEmail = 'jarmander105@gmail.com';

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const checkboxes = Array.from(document.querySelectorAll('input[type="checkbox"][data-id]'));
    const detailsNodes = Array.from(document.querySelectorAll('details[data-key]'));
    const progressBar = document.getElementById('overall-progress');
    const progressText = document.getElementById('progress-text');
    const authStatus = document.getElementById('auth-status');

    let isEditMode = false;
    let isInitialized = false;
    const dbPath = 'roadmap-state';

    function buildParentMap() {
      const map = new Map();
      checkboxes.forEach(box => {
        const parentId = box.dataset.parent;
        if (parentId) {
          if (!map.has(parentId)) {
            map.set(parentId, []);
          }
          map.get(parentId).push(box);
        }
      });
      return map;
    }

    const parentMap = buildParentMap();

    function updateParent(id) {
      const parentBox = document.querySelector(`input[data-id="${id}"]`);
      const children = parentMap.get(id) || [];
      if (!parentBox || children.length === 0) return;

      const allChecked = children.every(child => child.checked);
      parentBox.checked = allChecked;
      parentBox.indeterminate = !allChecked && children.some(child => child.checked);

      const parentOfParent = parentBox.dataset.parent;
      if (parentOfParent) {
        updateParent(parentOfParent);
      }
    }

    function updateAllParents() {
      Array.from(parentMap.keys()).forEach(id => updateParent(id));
    }

    function saveState() {
      if (!isEditMode || !isInitialized) return;

      const saved = {
        checkboxes: {},
        details: {}
      };

      checkboxes.forEach(box => {
        saved.checkboxes[box.dataset.id] = box.checked;
      });

      detailsNodes.forEach(detail => {
        saved.details[detail.dataset.key] = detail.open;
      });

      db.ref(dbPath).set(saved).catch(err => {
        console.error('Failed to save:', err);
        alert('Error saving to Firebase. Check console.');
      });

      updateProgress();
    }

    function loadState(data) {
      if (!data) {
        updateAllParents();
        updateProgress();
        return;
      }

      if (data.checkboxes) {
        checkboxes.forEach(box => {
          if (data.checkboxes.hasOwnProperty(box.dataset.id)) {
            box.checked = data.checkboxes[box.dataset.id];
          }
        });
      }

      if (data.details) {
        detailsNodes.forEach(detail => {
          const value = data.details[detail.dataset.key];
          if (typeof value === 'boolean') {
            detail.open = value;
          }
        });
      }

      updateAllParents();
      updateTaskColors();
      updateMiniProgress();
      updateProgress();
    }

    function updateProgress() {
      const relevantBoxes = checkboxes.filter(box => !box.disabled || box.dataset.parent);
      const completed = relevantBoxes.filter(box => box.checked).length;
      const total = relevantBoxes.length;
      const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `${completed} of ${total} tasks complete (${percent}%)`;
      updateTaskColors();
      updateMiniProgress();
    }

    function setEditMode(enabled) {
      isEditMode = enabled;
      checkboxes.forEach(box => {
        const isParent = parentMap.has(box.dataset.id);
        box.disabled = !enabled || isParent;
      });
    }

    function updateTaskColors() {
      checkboxes.forEach(box => {
        const taskContainer = box.closest('li.task');
        if (!taskContainer) return;
        
        const children = parentMap.get(box.dataset.id) || [];
        if (children.length === 0) return;
        
        const checkedCount = children.filter(c => c.checked).length;
        const total = children.length;
        
        taskContainer.classList.remove('partial', 'full');
        
        if (checkedCount === total) {
          taskContainer.classList.add('full');
        } else if (checkedCount > 0) {
          taskContainer.classList.add('partial');
        }
      });
    }

    function updateMiniProgress() {
      checkboxes.forEach(box => {
        const taskContainer = box.closest('li.task');
        if (!taskContainer) return;
        
        const children = parentMap.get(box.dataset.id) || [];
        if (children.length === 0) return;
        
        let progressContainer = taskContainer.querySelector('.mini-progress-container');
        if (!progressContainer) {
          progressContainer = document.createElement('div');
          progressContainer.className = 'mini-progress-container';
          taskContainer.appendChild(progressContainer);
        }
        
        const checkedCount = children.filter(c => c.checked).length;
        const total = children.length;
        const percent = Math.round((checkedCount / total) * 100);
        
        let miniProgress = progressContainer.querySelector('.mini-progress');
        if (!miniProgress) {
          miniProgress = document.createElement('div');
          miniProgress.className = 'mini-progress';
          const bar = document.createElement('div');
          bar.className = 'mini-progress-bar';
          miniProgress.appendChild(bar);
          progressContainer.appendChild(miniProgress);
        }
        
        miniProgress.classList.toggle('partial', checkedCount > 0 && checkedCount < total);
        miniProgress.querySelector('.mini-progress-bar').style.width = `${percent}%`;
        
        let textSpan = progressContainer.querySelector('.mini-progress-text');
        if (!textSpan) {
          textSpan = document.createElement('span');
          textSpan.className = 'mini-progress-text';
          progressContainer.appendChild(textSpan);
        }
        textSpan.textContent = `${checkedCount}/${total}`;
      });
    }

    function updateAuthUI(user) {
      if (!user) {
        authStatus.textContent = '🔒 View Only Mode';
        authStatus.style.color = '#94a3b8';
        return;
      }

      if (user.email === allowedEditorEmail) {
        authStatus.textContent = `✏️ Signed in as ${user.email}`;
        authStatus.style.color = '#22c55e';
      } else {
        authStatus.textContent = `👁️ View only: ${user.email}`;
        authStatus.style.color = '#facc15';
      }
    }

    checkboxes.forEach(box => {
      box.addEventListener('change', () => {
        if (!isEditMode || box.disabled) {
          box.checked = !box.checked;
          return;
        }
        const parentId = box.dataset.parent;
        if (parentId) {
          updateParent(parentId);
        }
        saveState();
      });
    });

    detailsNodes.forEach(detail => {
      detail.addEventListener('toggle', () => {
        if (isEditMode) {
          saveState();
        }
        updateMiniProgress();
      });
    });

    auth.onAuthStateChanged(user => {
      if (user && user.email === allowedEditorEmail) {
        setEditMode(true);
        updateProgress();
      } else {
        setEditMode(false);
        updateProgress();
      }
    });

    db.ref(dbPath).on('value', snapshot => {
      const data = snapshot.val();
      loadState(data);
      if (!isInitialized) {
        isInitialized = true;
        updateMiniProgress();
      }
    }, err => {
      console.error('Firebase error:', err);
      if (!isInitialized) {
        isInitialized = true;
        updateMiniProgress();
      }
    });

    setEditMode(false);
    updateProgress();
  </script>
</body>
</html>
